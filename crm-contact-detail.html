<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Kontakt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./crm-contact-detail.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./crm-contact-detail.js"></script>
  </head>
  <body>
    <main class="detail-shell">
      <section class="hero panel">
        <header class="detail-header">
          <button id="backButton" class="button button-secondary" type="button">Zurück</button>
          <span class="eyebrow">CRM Kontakt</span>
        </header>
        <div class="hero-content">
          <div class="avatar" id="contactAvatar" aria-hidden="true">K</div>
          <div class="hero-copy">
            <h1 id="contactTitle">Kontakt</h1>
            <p id="contactMeta" class="subtle-text">–</p>
          </div>
          <span id="contactCategoryBadge" class="badge">Kategorie</span>
        </div>
      </section>

      <section class="detail-grid">
        <section class="panel info-panel">
          <h2>Kontaktinformationen</h2>
          <dl id="contactInfo" class="info-grid"></dl>
        </section>

        <section class="content-stack">
          <section class="panel">
            <header class="notes-header">
              <h2>Notizen</h2>
              <button id="openNoteModalButton" class="button button-primary icon-button" type="button" aria-label="Neue Notiz">
                +
              </button>
            </header>
            <div id="alert" class="alert hidden"></div>
            <ul id="notesList" class="notes-list"></ul>
          </section>
        </section>
      </section>
    </main>

    <div id="noteModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="noteModalTitle">
      <div class="modal-content">
        <header class="modal-header">
          <h2 id="noteModalTitle">Neue Notiz</h2>
          <button id="closeNoteModalButton" class="button button-secondary icon-button" type="button" aria-label="Schließen">
            ×
          </button>
        </header>
        <form id="noteForm" class="form-grid">
          <label class="full-width">
            <span>Notiz *</span>
            <textarea id="noteTextInput" rows="5" required></textarea>
          </label>
          <label class="full-width">
            <span>Anhänge (PDF)</span>
            <input id="noteAttachmentInput" type="file" accept="application/pdf,.pdf" multiple />
          </label>
          <div class="full-width form-actions">
            <button id="saveNoteButton" class="button button-primary" type="submit">Notiz speichern</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
