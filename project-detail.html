<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auftrag</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./project-detail.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./project-detail.js"></script>
  </head>
  <body>
    <div class="detail-shell">
      <aside class="detail-sidebar" aria-label="Auftragsnavigation">
        <div class="nav-icon-list">
          <button class="nav-icon-button active" type="button" aria-label="Auftrag" title="Auftrag">
            <span class="icon" aria-hidden="true">🏗️</span>
            <span class="nav-label">Auftrag</span>
          </button>
        </div>
        <div class="nav-icon-footer">
          <button id="backIconButton" class="nav-icon-button" type="button" title="Zurück" aria-label="Zurück">
            <span class="icon" aria-hidden="true">↩️</span>
            <span class="nav-label">Zurück</span>
          </button>
        </div>
      </aside>

      <main class="detail-content">
        <section class="detail-panel" aria-label="Auftragsinhalt">
          <header class="detail-header">
            <div>
              <h1 id="projectTitle">Auftrag</h1>
              <p id="projectMeta" class="project-meta"></p>
            </div>
            <div class="header-actions">
              <button id="openDocumentsButton" class="button-secondary" type="button">Dokumente</button>
              <div id="projectBudget" class="budget-pill">Budget: –</div>
            </div>
          </header>

          <div id="alert" class="alert hidden"></div>
          <section class="project-schedule-panel" aria-label="Einsatzplanung">
            <div class="project-schedule-grid">
              <div>
                <span class="subtle-label">Letzter Einsatz</span>
                <strong id="projectLastAssignment">—</strong>
              </div>
              <div>
                <span class="subtle-label">Geplanter Einsatz</span>
                <strong id="projectNextAssignment">—</strong>
              </div>
            </div>
            <button id="projectGapSearchButton" class="button-secondary hidden" type="button">Freie Lücken suchen</button>
          </section>

          <p class="board-hint">Direkte Bearbeitung in den Karten – ohne Seitenpanel.</p>
          <section class="kanban-board" id="kanbanBoard" aria-label="Kanban Board"></section>
        </section>
      </main>
    </div>

    <div id="noteTypeModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="noteTypeModalTitle">
      <div id="noteTypeModalBackdrop" class="modal-backdrop"></div>
      <div class="modal-card note-type-modal-card">
        <header class="modal-header">
          <h2 id="noteTypeModalTitle">Notiztyp wählen</h2>
          <button id="closeNoteTypeModalButton" class="icon-action" type="button" aria-label="Schliessen">✕</button>
        </header>
        <div id="noteTypeOptions" class="note-type-options"></div>
      </div>
    </div>

    <div id="attachmentModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="attachmentModalTitle">
      <div id="attachmentModalBackdrop" class="modal-backdrop"></div>
      <div class="modal-card attachment-modal-card">
        <header class="modal-header">
          <h2 id="attachmentModalTitle">Anhänge</h2>
          <button id="closeAttachmentModalButton" class="icon-action" type="button" aria-label="Schliessen">✕</button>
        </header>
        <div id="attachmentModalContent"></div>
      </div>
    </div>

    <div id="documentsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="documentsModalTitle">
      <div id="documentsModalBackdrop" class="modal-backdrop"></div>
      <div class="modal-card documents-modal-card">
        <header class="modal-header">
          <h2 id="documentsModalTitle">Alle Dokumente</h2>
          <div class="modal-actions">
            <button id="closeDocumentsModalButton" class="icon-action" type="button" title="Schliessen" aria-label="Schliessen">✕</button>
          </div>
        </header>
        <div id="documentsOverviewList" class="documents-overview-list"></div>
      </div>
    </div>

    <div id="counterHistoryModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="counterHistoryModalTitle">
      <div id="counterHistoryModalBackdrop" class="modal-backdrop"></div>
      <div class="modal-card counter-history-modal-card">
        <header class="modal-header">
          <h2 id="counterHistoryModalTitle">Counter History</h2>
          <button id="closeCounterHistoryModalButton" class="icon-action" type="button" aria-label="Schliessen">✕</button>
        </header>
        <div id="counterHistoryModalContent"></div>
      </div>
    </div>

    <div id="todoHistoryModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="todoHistoryModalTitle">
      <div id="todoHistoryModalBackdrop" class="modal-backdrop"></div>
      <div class="modal-card counter-history-modal-card">
        <header class="modal-header">
          <h2 id="todoHistoryModalTitle">To-do History</h2>
          <button id="closeTodoHistoryModalButton" class="icon-action" type="button" aria-label="Schliessen">✕</button>
        </header>
        <div id="todoHistoryModalContent"></div>
      </div>
    </div>
  </body>
</html>
