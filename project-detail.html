<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auftrag</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./project-detail.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./project-detail.js"></script>
  </head>
  <body>
    <div class="detail-shell">
      <aside class="detail-sidebar" aria-label="Auftragsnavigation">
        <div class="nav-icon-list">
          <button class="nav-icon-button active" type="button" aria-label="Auftrag" title="Auftrag">
            <span class="icon" aria-hidden="true">🏗️</span>
            <span class="nav-label">Auftrag</span>
          </button>
        </div>
        <div class="nav-icon-footer">
          <button id="backIconButton" class="nav-icon-button" type="button" title="Zurück" aria-label="Zurück">
            <span class="icon" aria-hidden="true">↩️</span>
            <span class="nav-label">Zurück</span>
          </button>
        </div>
      </aside>

      <main class="detail-content">
        <section class="detail-panel" aria-label="Auftragsinhalt">
          <header class="detail-header">
            <div>
              <h1 id="projectTitle">Auftrag</h1>
              <p id="projectMeta" class="project-meta"></p>
            </div>
            <div class="header-actions">
              <button id="openDocumentsButton" class="button-secondary" type="button">Dokumente</button>
              <div id="projectBudget" class="budget-pill">Budget: –</div>
            </div>
          </header>

          <div id="alert" class="alert hidden"></div>

          <p class="board-hint">Direkte Bearbeitung in den Karten. Für Verlauf &amp; Details eine Notiz antippen.</p>
          <section class="kanban-board" id="kanbanBoard" aria-label="Kanban Board"></section>
        </section>
      </main>
    </div>

    <aside id="notePanel" class="slide-panel hidden" aria-label="Notiz Details">
      <div id="notePanelBackdrop" class="slide-backdrop"></div>
      <section class="slide-card">
        <header class="slide-header">
          <button id="closePanelButton" class="icon-action" type="button" title="Schliessen" aria-label="Schliessen">✕</button>
        </header>
        <form id="createNoteForm" class="create-note-form hidden">
          <label>
            Typ
            <select id="newNoteType" required>
              <option value="text">Notiz</option>
              <option value="todo">To-do-Notiz</option>
              <option value="counter">Counter-Notiz</option>
            </select>
          </label>
          <label data-type-field="text" data-type="text">
            Beschreibung
            <textarea id="newNoteText" rows="3" placeholder="Beschreibung"></textarea>
          </label>
          <label data-type-field="todo" data-type="todo" class="hidden">
            Beschreibung (optional)
            <textarea id="newTodoDescription" rows="2" placeholder="Beschreibung für diese To-do-Notiz"></textarea>
          </label>
          <label data-type-field="todo" data-type="todo" class="hidden">
            Erstes To-do (optional)
            <input id="newTodoItem" type="text" maxlength="180" placeholder="Ersten Punkt hinzufügen" />
          </label>
          <label data-type-field="counter" data-type="counter" class="hidden">
            Beschreibung (pflichtig)
            <textarea id="newCounterDescription" rows="2" placeholder="Beschreibung"></textarea>
          </label>
          <label data-type-field="counter" data-type="counter" class="hidden">
            Zielwert
            <input id="newCounterStart" type="number" step="1" value="1" min="1" />
          </label>
          <div class="form-actions">
            <button class="button-primary" type="submit">Notiz erstellen</button>
          </div>
        </form>
        <div id="panelContent" class="panel-content"></div>
      </section>
    </aside>

    <div id="documentsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="documentsModalTitle">
      <div id="documentsModalBackdrop" class="modal-backdrop"></div>
      <div class="modal-card documents-modal-card">
        <header class="modal-header">
          <h2 id="documentsModalTitle">Alle Dokumente</h2>
          <div class="modal-actions">
            <button id="closeDocumentsModalButton" class="icon-action" type="button" title="Schliessen" aria-label="Schliessen">✕</button>
          </div>
        </header>
        <div id="documentsOverviewList" class="documents-overview-list"></div>
      </div>
    </div>
  </body>
</html>
